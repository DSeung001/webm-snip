services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /workspace
    volumes:
      - .:/workspace
      - pnpm-store:/root/.local/share/pnpm/store
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - target:/workspace/src-tauri/target
    environment:
      WEBM_SNIP_FFMPEG: /usr/bin/ffmpeg
      WEBM_SNIP_FFPROBE: /usr/bin/ffprobe
    ports:
      - "1420:1420"
    command: bash -lc "pnpm install && pnpm dev"

volumes:
  pnpm-store:
  cargo-registry:
  cargo-git:
  target:
